kind = "web"
previewPath = "/"
title = "LeadEXA"
version = "1.0.0"
id = "artifacts/leadexa"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25271

[services.development]
run = "pnpm --filter @workspace/leadexa run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/leadexa", "run", "build" ]
publicDir = "artifacts/leadexa/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25271"
BASE_PATH = "/"
